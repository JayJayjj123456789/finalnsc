    <style>
      .material-symbols-outlined { font-family:'Material Symbols Outlined';font-weight:normal;font-style:normal;font-size:20px;line-height:1;letter-spacing:normal;text-transform:none;display:inline-block;white-space:nowrap;word-wrap:normal;direction:ltr;-webkit-font-feature-settings:'liga';-webkit-font-smoothing:antialiased; }
      .glass-panel { background:rgba(255,255,255,0.7);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(0,0,0,0.1);box-shadow:none; }
      .glass-button-primary { background:#006767;color:#fff;border:1px solid #006767;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:all 0.2s ease;box-shadow:none; }
      .glass-button-primary:hover { background:#008282;color:#f3fffe;border-color:#008282;box-shadow:none;transform:translateY(-1px); }
      .glass-button-secondary { background:rgba(255,255,255,0.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid #bcc9c8;color:#191c1d;transition:all 0.2s ease;box-shadow:none; }
      .glass-button-secondary:hover { background:#fff;border-color:#6d7979;transform:translateY(-1px);box-shadow:none; }
      .glass-input { background:rgba(255,255,255,0.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid #bcc9c8;color:#191c1d;transition:all 0.2s ease;box-shadow:none; }
      .glass-input:focus { outline:none;border-color:#006767;background:#fff;box-shadow:none; }
      .cursor { display:inline-block;width:2px;background-color:#006767;margin-left:4px;animation:blink 1s step-end infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      #map-canvas-container { width:100%;height:100%;pointer-events:none; }
      .map-glow { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:800px;height:800px;background:radial-gradient(circle,rgba(0,103,103,0.06) 0%,transparent 60%);z-index:-1;pointer-events:none; }
      @media(max-width:768px) { .map-glow{width:500px;height:500px} }
      .bg-modern-gradient { background:radial-gradient(circle at 50% -20%,#ffffff 0%,#f8f9fa 70%); }
      .text-gradient { background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-image:linear-gradient(to right,#191c1d,#3d4949);text-shadow:none!important; }
      .text-gradient-primary { background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-image:linear-gradient(135deg,#006767 0%,#008282 100%);text-shadow:none!important; }
